services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: etl_demo
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
